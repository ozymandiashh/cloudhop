name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pywebview

      - name: Download rclone
        run: |
          Invoke-WebRequest -Uri "https://downloads.rclone.org/rclone-current-windows-amd64.zip" -OutFile rclone.zip
          Expand-Archive rclone.zip -DestinationPath rclone-tmp
          $rclonePath = Get-ChildItem -Path rclone-tmp -Recurse -Filter "rclone.exe" | Select-Object -First 1
          Copy-Item $rclonePath.FullName -Destination "rclone.exe"
        shell: powershell

      - name: Build Windows exe
        run: pyinstaller cloudhop_win.spec --clean --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/CloudHop.exe

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CloudHop.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pywebview

      - name: Download rclone
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ]; then
            curl -LO https://downloads.rclone.org/rclone-current-osx-arm64.zip
            unzip rclone-current-osx-arm64.zip
            RCLONE_BIN=$(find rclone-*-osx-arm64 -name "rclone" -type f | head -1)
          else
            curl -LO https://downloads.rclone.org/rclone-current-osx-amd64.zip
            unzip rclone-current-osx-amd64.zip
            RCLONE_BIN=$(find rclone-*-osx-amd64 -name "rclone" -type f | head -1)
          fi
          cp "$RCLONE_BIN" rclone

      - name: Build with PyInstaller
        run: |
          pyinstaller cloudhop.spec --noconfirm

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R dist/CloudHop.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          for i in 1 2 3; do
            hdiutil create -volname "CloudHop" -srcfolder dmg-staging -ov -format UDZO CloudHop-mac.dmg && break
            echo "Attempt $i failed, waiting..."
            sleep 5
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: CloudHop-mac.dmg

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: CloudHop-mac.dmg
